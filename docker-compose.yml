version: '3.8'

services:

  chatbot_main_service:
    build:
      context: ./chatbot_main_service
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: chatbot_main_service
    restart: always

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    environment:
      - HOME=/app
      - HF_HOME=/app/models/huggingface
      - TRANSFORMERS_CACHE=/app/models/huggingface

    volumes:
      - ./chatbot_main_service:/app
      - ./models:/app/models

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 40
      start_period: 60s