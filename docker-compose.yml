version: '3.8'

services:

  chatbot_main_service:
    build:
      context: ./chatbot_main_service
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: chatbot_main_service
    restart: always

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    environment:
      - HOME=/app
      - HF_HOME=/app/models/huggingface
      - TRANSFORMERS_CACHE=/app/models/huggingface

      # Database
      - DATABASE_URL=postgresql+psycopg://chatbot:chatbot@postgres:5432/chatbot
      - JWT_SECRET_KEY=super_secret_key_123456789
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440

    volumes:
      - ./chatbot_main_service:/app
      - ./models:/app/models

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 40
      start_period: 60s

  postgres:
    image: pgvector/pgvector:pg15

    container_name: chatbot_postgres

    restart: always

    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: